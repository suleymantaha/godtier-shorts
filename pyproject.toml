[tool.pyre]
python_version = "3.13"
site_package_search_strategy = "all"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["."]
addopts = "-v --tb=short"
markers = [
    "integration: integration tests (require workspace/video)",
    "unit: fast unit tests",
    "smoke: minimum CI smoke tests",
]

[tool.coverage.run]
source = ["backend"]

[tool.coverage.report]
fail_under = 70
show_missing = true
skip_covered = false
